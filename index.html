<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #eee;
      font-family: 'Orbitron', monospace;
      user-select: none;
    }

    #top-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 1.4rem;
      align-items: flex-end;
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #666;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      min-width: 40px;
      text-align: center;
    }

    #best-val { color: #555; font-size: 22px; }

    #simon-board {
      position: relative;
      width: 85vmin;
      max-width: 450px;
      height: 85vmin;
      max-height: 450px;
      border-radius: 50%;
      overflow: hidden;
      border: 7px solid #333;
      box-shadow: 0 0 0 3px #1a1a1a;
      flex-shrink: 0;
    }

    .pad {
      position: absolute;
      width: 48.5%;
      height: 48.5%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      transition: filter 0.07s ease, transform 0.07s ease;
    }

    .pad:hover { filter: brightness(1.25); }
    .pad:active { transform: scale(0.97); filter: brightness(1.7) !important; }

    #pad-green  { top:0; left:0;     background:#1a8a3c; clip-path:polygon(0 0,100% 0,0 100%); }
    #pad-red    { top:0; right:0;    background:#b81c1c; clip-path:polygon(100% 0,100% 100%,0 0); }
    #pad-yellow { bottom:0; left:0;  background:#c8a800; clip-path:polygon(0 0,100% 100%,0 100%); }
    #pad-blue   { bottom:0; right:0; background:#1a4fb8; clip-path:polygon(100% 0,100% 100%,0 100%); }

    .pad.lit { filter: brightness(2.5) saturate(1.5) !important; transform: scale(1.02); }

    .pad-label {
      position: absolute;
      font-size: clamp(8px, 2.5vmin, 12px);
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
    }
    #lbl-green  { top: 12%; left: 10%; }
    #lbl-red    { top: 12%; right: 10%; }
    #lbl-yellow { bottom: 12%; left: 10%; }
    #lbl-blue   { bottom: 12%; right: 10%; }

    #center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 26%; height: 26%;
      border-radius: 50%;
      background: #111;
      border: 3px solid #444;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background 0.15s;
    }

    #center-btn:hover { background: #1c1c1c; }

    #center-logo {
      font-size: clamp(8px, 2vmin, 12px);
      font-weight: 900;
      letter-spacing: 3px;
      color: #555;
    }

    #center-status {
      font-size: clamp(9px, 2.5vmin, 14px);
      font-weight: 700;
      color: #eee;
      margin-top: 3px;
      letter-spacing: 1px;
    }

    #progress-bar-wrap {
      margin-top: 1.3rem;
      width: 85vmin;
      max-width: 450px;
      height: 5px;
      background: #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #eee;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    #message {
      margin-top: 1rem;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #666;
      text-align: center;
      min-height: 18px;
      text-transform: uppercase;
    }

    #controls {
      margin-top: 1.1rem;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #666;
      cursor: pointer;
      text-transform: uppercase;
    }

    .toggle-box {
      width: 15px; height: 15px;
      border: 1.5px solid #444;
      border-radius: 3px;
      background: #111;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: #eee;
    }

    #speed-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #666;
      text-transform: uppercase;
    }

    #speed-select {
      font-size: 10px;
      font-family: 'Orbitron', monospace;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #111;
      color: #eee;
      cursor: pointer;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }

    .shake { animation: shake 0.45s ease; }
  </style>
</head>
<body>

  <div id="top-bar">
    <div class="stat-box">
      <span class="stat-label">Mejor</span>
      <span class="stat-value" id="best-val">–</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Nivel</span>
      <span class="stat-value" id="level-val">–</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Paso</span>
      <span class="stat-value" id="step-val">–</span>
    </div>
  </div>

  <div id="simon-board">
    <div class="pad" id="pad-green"  data-color="green"></div>
    <div class="pad" id="pad-red"    data-color="red"></div>
    <div class="pad" id="pad-yellow" data-color="yellow"></div>
    <div class="pad" id="pad-blue"   data-color="blue"></div>
    <div class="pad-label" id="lbl-green">VERDE</div>
    <div class="pad-label" id="lbl-red">ROJO</div>
    <div class="pad-label" id="lbl-yellow">AMARILLO</div>
    <div class="pad-label" id="lbl-blue">AZUL</div>
    <div id="center-btn">
      <div id="center-logo">SIMON</div>
      <div id="center-status">START</div>
    </div>
  </div>

  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>

  <div id="message">Presiona START para jugar</div>

  <div id="controls">
    <label class="toggle-wrap" id="strict-toggle">
      <div class="toggle-box" id="strict-box">✓</div>
      Modo estricto
    </label>
    <label class="toggle-wrap" id="sound-toggle">
      <div class="toggle-box" id="sound-box">✓</div>
      Sonido
    </label>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="speed-label">Velocidad</span>
      <select id="speed-select">
        <option value="slow">Lenta</option>
        <option value="normal" selected>Normal</option>
        <option value="fast">Rápida</option>
      </select>
    </div>
  </div>

  <script>
    const COLORS   = ['green', 'red', 'yellow', 'blue'];
    const FREQS    = { green: 415, red: 310, yellow: 252, blue: 209 };
    const SPEED_MAP = { slow: 580, normal: 450, fast: 300 };

    let audioCtx  = null;
    let soundOn   = true;
    let strictMode = true;
    let sequence  = [], playerIndex = 0;
    let gameActive = false, playerTurn = false;
    let bestScore = 0;

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTone(color, dur = 0.38) {
      if (!soundOn) return;
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(FREQS[color], ctx.currentTime);
      gain.gain.setValueAtTime(0.48, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
    }

    function playWrong() {
      if (!soundOn) return;
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(90, ctx.currentTime);
      gain.gain.setValueAtTime(0.28, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.9);
    }

    function playWin() {
      if (!soundOn) return;
      const ctx = getCtx();
      [523, 659, 784, 1047].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.15);
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.4);
      });
    }

    function playLevelUp() {
      if (!soundOn) return;
      const ctx = getCtx();
      [330, 440].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
        gain.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.2);
        osc.start(ctx.currentTime + i * 0.1);
        osc.stop(ctx.currentTime + i * 0.1 + 0.2);
      });
    }

    const levelEl     = document.getElementById('level-val');
    const stepEl      = document.getElementById('step-val');
    const bestEl      = document.getElementById('best-val');
    const msgEl       = document.getElementById('message');
    const centerStatus = document.getElementById('center-status');
    const centerBtn   = document.getElementById('center-btn');
    const progressBar = document.getElementById('progress-bar');
    const strictBox   = document.getElementById('strict-box');
    const soundBox    = document.getElementById('sound-box');
    const speedSel    = document.getElementById('speed-select');
    const board       = document.getElementById('simon-board');

    function setMsg(t) { msgEl.textContent = t; }

    function updateProgress() {
      if (!gameActive || sequence.length === 0) { progressBar.style.width = '0%'; return; }
      progressBar.style.width = ((playerIndex / sequence.length) * 100) + '%';
    }

    function updateStepDisplay() {
      stepEl.textContent = (gameActive && playerTurn)
        ? (playerIndex + 1) + '/' + sequence.length
        : '–';
      updateProgress();
    }

    function lightUp(color, ms) {
      return new Promise(resolve => {
        const pad = document.getElementById('pad-' + color);
        pad.classList.add('lit');
        playTone(color, ms / 1000);
        setTimeout(() => { pad.classList.remove('lit'); resolve(); }, ms);
      });
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function getSpeed() {
      const base = SPEED_MAP[speedSel.value] || 450;
      return Math.max(180, base - Math.min(sequence.length * 12, 180));
    }

    async function showSequence() {
      playerTurn = false;
      setMsg('Mira el patrón...');
      centerStatus.textContent = 'SIMON';
      stepEl.textContent = '–';
      progressBar.style.width = '0%';
      await sleep(600);

      const spd = getSpeed();
      for (let c of sequence) {
        await lightUp(c, spd);
        await sleep(70);
      }

      await sleep(280);
      playerTurn = true;
      playerIndex = 0;
      setMsg('¡Tu turno! Repite el patrón');
      centerStatus.textContent = 'TÚ';
      updateStepDisplay();
    }

    function addToSequence() {
      sequence.push(COLORS[Math.floor(Math.random() * 4)]);
      levelEl.textContent = sequence.length;
      if (sequence.length > bestScore) {
        bestScore = sequence.length;
        bestEl.textContent = bestScore;
      }
    }

    async function startGame() {
      sequence = [];
      playerIndex = 0;
      gameActive = true;
      playerTurn = false;
      setMsg('');
      levelEl.textContent = '0';
      stepEl.textContent = '–';
      progressBar.style.width = '0%';
      centerStatus.textContent = '...';
      await sleep(400);
      addToSequence();
      await showSequence();
    }

    function shakeBoard() {
      board.classList.remove('shake');
      void board.offsetWidth; // forzar reflow para reiniciar animación
      board.classList.add('shake');
      board.addEventListener('animationend', () => board.classList.remove('shake'), { once: true });
    }

    async function handleInput(color) {
      if (!gameActive || !playerTurn) return;

      // Iniciar efecto visual/sonoro de inmediato sin bloquear la ejecución (para respuesta rápida)
      lightUp(color, 150);

      if (color !== sequence[playerIndex]) {
        playerTurn = false;
        playWrong();
        shakeBoard();
        setMsg('¡Error! ' + (strictMode ? 'Reiniciando...' : 'Repite la secuencia'));
        centerStatus.textContent = '✗';
        progressBar.style.width = '0%';
        stepEl.textContent = '–';
        await sleep(1300);

        if (strictMode) {
          gameActive = false;
          setMsg('Presiona START para jugar de nuevo');
          centerStatus.textContent = 'START';
          levelEl.textContent = '–';
        } else {
          gameActive = true;
          await showSequence();
        }
        return;
      }

      playerIndex++;
      updateStepDisplay();

      if (playerIndex === sequence.length) {
        playerTurn = false;
        if (sequence.length === 20) {
          playWin();
          setMsg('¡GANASTE! ¡20/20! Increíble');
          centerStatus.textContent = '★';
          progressBar.style.width = '100%';
          gameActive = false;
          return;
        }
        playLevelUp();
        setMsg('¡Correcto!');
        await sleep(650);
        addToSequence();
        await showSequence();
      }
    }

    // Eventos de los pads (usando pointerdown para reaccionar más rápido)
    COLORS.forEach(color => {
      const pad = document.getElementById('pad-' + color);
      pad.addEventListener('pointerdown', () => handleInput(color));
      // Prevenir el menú contextual para que no interfiera en móviles
      pad.addEventListener('contextmenu', e => e.preventDefault());
    });

    // Botón central
    centerBtn.addEventListener('pointerdown', () => { if (!gameActive) startGame(); });

    // Toggles
    document.getElementById('strict-toggle').addEventListener('click', () => {
      strictMode = !strictMode;
      strictBox.textContent = strictMode ? '✓' : '';
    });

    document.getElementById('sound-toggle').addEventListener('click', () => {
      soundOn = !soundOn;
      soundBox.textContent = soundOn ? '✓' : '';
    });
  </script>
</body>
</html>
