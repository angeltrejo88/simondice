<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #eee;
      font-family: 'Orbitron', monospace;
      user-select: none;
    }

    #score-display {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    #score-num {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      display: block;
      line-height: 1;
      margin-top: 4px;
    }

    #simon-board {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      overflow: hidden;
      border: 6px solid #333;
      box-shadow: 0 0 0 2px #222;
    }

    .pad {
      position: absolute;
      width: 142px;
      height: 142px;
      cursor: pointer;
      transition: filter 0.08s ease;
    }

    #pad-green {
      top: 0; left: 0;
      background: #1a8a3c;
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }

    #pad-red {
      top: 0; right: 0;
      background: #b81c1c;
      clip-path: polygon(100% 0, 100% 100%, 0 0);
    }

    #pad-yellow {
      bottom: 0; left: 0;
      background: #c8a800;
      clip-path: polygon(0 0, 100% 100%, 0 100%);
    }

    #pad-blue {
      bottom: 0; right: 0;
      background: #1a4fb8;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .pad.lit { filter: brightness(2.2) saturate(1.4); }

    #center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80px; height: 80px;
      border-radius: 50%;
      background: #111;
      border: 3px solid #444;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }

    #center-btn:hover { background: #1a1a1a; }

    #center-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #666;
    }

    #center-status {
      font-size: 9px;
      font-weight: 700;
      color: #eee;
      margin-top: 2px;
      letter-spacing: 1px;
    }

    #message {
      margin-top: 1.5rem;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #888;
      text-align: center;
      min-height: 20px;
      text-transform: uppercase;
    }

    #strict-toggle {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #666;
      cursor: pointer;
    }

    #strict-box {
      width: 16px; height: 16px;
      border: 1.5px solid #555;
      border-radius: 3px;
      background: #111;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      color: #eee;
    }
  </style>
</head>
<body>

  <div id="score-display">
    NIVEL
    <span id="score-num">–</span>
  </div>

  <div id="simon-board">
    <div class="pad" id="pad-green"  data-color="green"></div>
    <div class="pad" id="pad-red"    data-color="red"></div>
    <div class="pad" id="pad-yellow" data-color="yellow"></div>
    <div class="pad" id="pad-blue"   data-color="blue"></div>

    <div id="center-btn">
      <div id="center-label">SIMON</div>
      <div id="center-status">START</div>
    </div>
  </div>

  <div id="message">Presiona START para jugar</div>

  <label id="strict-toggle">
    <div id="strict-box">✓</div>
    MODO ESTRICTO
  </label>

  <script>
    const COLORS = ['green', 'red', 'yellow', 'blue'];

    // Frecuencias musicales para cada color (como el Simon original)
    const FREQS = {
      green:  415,
      red:    310,
      yellow: 252,
      blue:   209
    };

    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTone(color, duration = 0.4) {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(FREQS[color], ctx.currentTime);
      gain.gain.setValueAtTime(0.45, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    }

    function playWrong() {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, ctx.currentTime);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.8);
    }

    function playWin() {
      const ctx = getAudio();
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.4);
      });
    }

    let sequence = [];
    let playerIndex = 0;
    let gameActive = false;
    let playerTurn = false;
    let strictMode = true;

    const scoreEl      = document.getElementById('score-num');
    const msgEl        = document.getElementById('message');
    const centerStatus = document.getElementById('center-status');
    const centerBtn    = document.getElementById('center-btn');
    const strictBox    = document.getElementById('strict-box');
    const strictToggle = document.getElementById('strict-toggle');

    function lightUp(color, ms = 400) {
      return new Promise(resolve => {
        const pad = document.getElementById('pad-' + color);
        pad.classList.add('lit');
        playTone(color, ms / 1000);
        setTimeout(() => {
          pad.classList.remove('lit');
          resolve();
        }, ms);
      });
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function showSequence() {
      playerTurn = false;
      setMsg('Mira el patrón...');
      centerStatus.textContent = 'SIMON';
      await sleep(600);

      // La velocidad aumenta conforme crece la secuencia
      const speed = Math.max(200, 450 - sequence.length * 18);

      for (let c of sequence) {
        await lightUp(c, speed);
        await sleep(80);
      }

      await sleep(300);
      playerTurn = true;
      playerIndex = 0;
      setMsg('¡Tu turno! Repite el patrón');
      centerStatus.textContent = 'TÚ';
    }

    function addToSequence() {
      const r = COLORS[Math.floor(Math.random() * 4)];
      sequence.push(r);
      scoreEl.textContent = sequence.length;
    }

    function setMsg(txt) {
      msgEl.textContent = txt;
    }

    async function startGame() {
      sequence = [];
      playerIndex = 0;
      gameActive = true;
      playerTurn = false;
      setMsg('');
      scoreEl.textContent = '0';
      centerStatus.textContent = '...';
      await sleep(400);
      addToSequence();
      await showSequence();
    }

    async function handlePlayerInput(color) {
      if (!gameActive || !playerTurn) return;

      playerTurn = false;
      await lightUp(color, 280);

      if (color !== sequence[playerIndex]) {
        playWrong();
        setMsg('¡Error! ' + (strictMode ? 'Reiniciando...' : 'Repite la secuencia'));
        gameActive = false;
        centerStatus.textContent = 'FAIL';
        await sleep(1200);

        if (strictMode) {
          gameActive = false;
          setMsg('Presiona START para jugar de nuevo');
          centerStatus.textContent = 'START';
          scoreEl.textContent = '–';
        } else {
          gameActive = true;
          await showSequence();
        }
        return;
      }

      playerIndex++;

      if (playerIndex === sequence.length) {
        if (sequence.length === 20) {
          playWin();
          setMsg('¡GANASTE! ¡20/20! ¡Increíble!');
          centerStatus.textContent = '!!';
          gameActive = false;
          return;
        }
        playerTurn = false;
        await sleep(600);
        addToSequence();
        await showSequence();
      } else {
        playerTurn = true;
      }
    }

    // Eventos de los pads
    COLORS.forEach(color => {
      const pad = document.getElementById('pad-' + color);
      pad.addEventListener('click', () => {
        if (!gameActive && !playerTurn) return;
        handlePlayerInput(color);
      });
    });

    // Botón central: inicia o reinicia el juego
    centerBtn.addEventListener('click', () => {
      if (!gameActive) startGame();
    });

    // Toggle modo estricto
    strictToggle.addEventListener('click', () => {
      strictMode = !strictMode;
      strictBox.textContent = strictMode ? '✓' : '';
    });
  </script>
</body>
</html>
